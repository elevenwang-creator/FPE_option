[workspace]
name = "fpe-engine"
version = "0.1.0"
description = "FPE Option Pricing Engine — Mojo + MAX AI Kernels"
channels = [
    "https://conda.modular.com/max-nightly",
    "conda-forge"
]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
max = "==26.3.0.dev2026040405"
mojo = "==0.26.3.0.dev2026040405"
matplotlib = ">=3.10.8,<4"
scipy = ">=1.17.1,<2"
numpy = ">=2.4.3,<3"
seaborn = ">=0.13.2,<0.14"
cvxpy = ">=1.8.2,<2"

[tasks]
build = "mojo build src/"
test = "mojo run -I src tests/test_sparse.mojo"
bench = "mojo run -I src benchmarks/run_all.mojo"
gpu-bench = "mojo run -I src --target-accelerator=metal:1 benchmarks/bench_gpu_batch_pricing.mojo"
gpu-test = "mojo run -I src --target-accelerator=metal:1 tests/test_metal_gpu.mojo"
