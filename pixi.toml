[workspace]
name = "fpe-engine"
version = "0.2.1"
description = "FPE Option Pricing Engine — Mojo + MAX AI Kernels (version from git tag)"
channels = [
    "https://conda.modular.com/max-nightly",
    "https://repo.prefix.dev/modular-community",
    "conda-forge"
]
platforms = ["osx-arm64", "linux-64"]
preview = ["pixi-build"]

[package]
name = "fpe-engine"
version = "0.2.1"

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*", channels = [
    "https://conda.modular.com/max-nightly",
    "https://repo.prefix.dev/modular-community",
    "conda-forge"
] }

[dependencies]
max = ">=26.3"
mojo = ">=1.0.0b2.dev2026050805,<2"
matplotlib = ">=3.10.8,<4"
scipy = ">=1.17.1,<2"
numpy = ">=2.4.3,<3"
seaborn = ">=0.13.2,<0.14"
cvxpy = ">=1.8.2,<2"
ipykernel = ">=7.1.0,<8"
pytest = ">=9.0.3,<10"
polars = ">=1.41.0,<2"
plotly = ">=6.6.0,<7"
nbformat = ">=5.10.4,<6"
nbconvert = ">=7.17.1,<8"

[tasks]
build = "bash scripts/build_cpp.sh"
test = "python -W 'ignore:builtin type Compute has no __module__:DeprecationWarning' -m pytest tests/test_pricer_stepwise.py -v"
test-mojo = "mojo run -I src tests/test_add.mojo"
test-fpe = "bash scripts/test_fpe.sh"
bench = "mojo run -I src benchmarks/bench_vs_python.mojo"
bench-inout = "mojo run -I src benchmarks/bench_inout_parity.mojo"
bench-py-ref = "python debug_python_ref.py"
bench-py-binding = "python -c \"from fpe_engine import Compute; from time import perf_counter as n; p=Compute(S0=60,V0=0.1,T=0.6,r=0.1,kappa=1.2,theta=0.05,sigma=0.35,rho=-0.4,n_s=38,n_v=38,s_min=0,s_max=150,barrier=50,option_type='down_and_out_call'); s=n(); p.payoff_price([65,70,75,80,85,90,95,100]); print('time:',n()-s)\""
gpu-test = "mojo run -I src --target-accelerator=metal:1 tests/test_metal_gpu.mojo"

cpp-run = "bash scripts/run_cpp.sh demo"
py-run = "bash scripts/run_python.sh backtest.py"
