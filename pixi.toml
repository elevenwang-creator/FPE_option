[workspace]
name = "fpe-engine"
version = "0.1.0"
description = "FPE Option Pricing Engine — Mojo + MAX AI Kernels"
channels = [
    "https://conda.modular.com/max-nightly",
    "https://repo.prefix.dev/modular-community",
    "conda-forge"
]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
max = ">=26.3"
mojo = ">=1.0.0b2.dev2026050805,<2"
matplotlib = ">=3.10.8,<4"
scipy = ">=1.17.1,<2"
numpy = ">=2.4.3,<3"
seaborn = ">=0.13.2,<0.14"
cvxpy = ">=1.8.2,<2"
ipykernel = ">=7.1.0,<8"
pytest = ">=9.0.3,<10"
polars = ">=1.41.0,<2"
plotly = ">=6.6.0,<7"
nbformat = ">=5.10.4,<6"

[tasks]
build = "bash scripts/build_cpp.sh"
test = "mojo run -I src tests/test_sparse.mojo"
bench = "mojo run -I src benchmarks/run_all.mojo"
gpu-bench = "mojo run -I src --target-accelerator=metal:1 benchmarks/bench_gpu_batch_pricing.mojo"
gpu-test = "mojo run -I src --target-accelerator=metal:1 tests/test_metal_gpu.mojo"

cpp-run = "bash scripts/run_cpp.sh live_trading"
py-run = "bash scripts/run_python.sh backtest.py"
