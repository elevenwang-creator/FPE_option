name: Publish
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    strategy:
      matrix:
        include:
          - platform: ubuntu-latest
            target: linux-64
          - platform: macos-latest
            target: osx-arm64
      max-parallel: 1
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.5
      - run: pixi run build
      - run: pixi auth login --token ${{ secrets.PIXI_TOKEN }} https://repo.prefix.dev
      - run: pixi build
      - run: pixi publish .pixi/output/*.conda --token ${{ secrets.PIXI_TOKEN }} https://repo.prefix.dev/fpe-engine
