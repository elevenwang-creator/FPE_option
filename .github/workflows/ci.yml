name: CI
on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]
      max-parallel: 1
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.5
      - run: pixi run build
      - run: pixi run test
      - run: pixi run test-fpe
      - run: pixi auth login --token ${{ secrets.PIXI_TOKEN }} https://repo.prefix.dev
      - run: pixi build

  fpe-mojo-tests:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]
      max-parallel: 1
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.5
      - run: pixi run test-fpe

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, fpe-mojo-tests]
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]
      max-parallel: 1
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.5
      - run: pixi run build
      - run: pixi auth login --token ${{ secrets.PIXI_TOKEN }} https://repo.prefix.dev
      - run: pixi build
      - run: pixi publish .pixi/output/*.conda --token ${{ secrets.PIXI_TOKEN }} https://repo.prefix.dev/modular-community
